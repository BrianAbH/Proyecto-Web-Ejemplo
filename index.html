<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Ejemplo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Tienda Online</h1>
    </header>
    <main>
        <section class="productos">
            <div class="producto">
                <img src="https://via.placeholder.com/200" alt="Producto 1">
                <h2>Producto 1</h2>
                <p>$10.00</p>
                <button>Comprar</button>
            </div>
            <div class="producto">
                <img src="https://via.placeholder.com/200" alt="Producto 2">
                <h2>Producto 2</h2>
                <p>$15.00</p>
                <button>Comprar</button>
            </div>
            <div class="producto">
                <img src="https://via.placeholder.com/200" alt="Producto 3">
                <h2>Producto 3</h2>
                <p>$20.00</p>
                <button>Comprar</button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Tienda Ejemplo</p>
    </footer>
</body>
</html>
